name: PR checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Set up linters
        run: |
          if ! make -j setup-lint; then
            sudo apt-get update
            make -j setup-lint
          fi
      - name: Lint
        run: make -k lint

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Set up test environment
        run: make setup-tests
      - name: Test
        run: make test

  test-distros:
    name: Test (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - almalinux/9
          - centos/9-Stream
          - debian/forky
          - debian/sid
          - fedora/43
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up LXD
        uses: canonical/setup-lxd@v1
        with:
          preseed: |
            networks:
            - name: lxdbr0
              type: bridge
              config:
                ipv4.address: auto
                ipv6.address: none
                dns.nameservers: 8.8.8.8,8.8.4.4
      - name: Launch container
        run: lxc launch images:${{ matrix.distro }} testenv
      - name: Install dependencies in container
        run: |
          lxc exec testenv -- sh -c "
            if command -v apt-get > /dev/null 2>&1; then
              apt-get update && apt-get install -y make curl
            elif command -v dnf > /dev/null 2>&1; then
              dnf install -y make curl
            else
              echo 'No supported package manager found' && exit 1
            fi
          "
      - name: Install uv in container
        run: lxc exec testenv -- sh -c "curl -LsSf https://astral.sh/uv/install.sh | sh"
      - name: Push source into container
        run: lxc file push --recursive . testenv/root/distro-support/
      - name: Set up tests
        run: lxc exec testenv --cwd /root/distro-support -- sh -c "PATH=/root/.local/bin:$PATH make setup-tests"
      - name: Run tests
        run: lxc exec testenv --cwd /root/distro-support -- sh -c "PATH=/root/.local/bin:$PATH make test"
